<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../../style.css" />
    <link rel="stylesheet" href="style.css" />
    <title></title>
  </head>
  <body>
    <div class="card">
      <div class="card-tag">01 . DOM Manipulation</div>
      <h2>Character Counter</h2>
      <div class="col">
        <textarea
          id="char-area"
          placeholder="Start typing anything..."
        ></textarea>
        <div id="char-stats">
          <div class="stats">
            <span id="char-count" class="stats-val">0</span
            ><span class="stats-lbl">CHARS</span>
          </div>
          <div class="stats">
            <span id="word-count" class="stats-val">0</span
            ><span class="stats-lbl">WORDS</span>
          </div>
          <div class="stats">
            <span id="line-count" class="stats-val">1</span
            ><span class="stats-lbl">LINES</span>
          </div>
          <div class="stats">
            <span id="read-time" class="stats-val">0s</span
            ><span class="stats-lbl">READ</span>
          </div>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
