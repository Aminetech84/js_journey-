<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../../style.css" />
    <link rel="stylesheet" href="style.css" />
    <title>KEYBOARD SPY</title>
  </head>
  <body>
    <div class="card">
      <div class="card-tag">08 . Event Listeners</div>
      <h2>Keyboard Spy</h2>
      <div class="col">
        <div id="key-box" tabindex="0" onclick="this.focus()">
          <div
            style="
              color: var(--muted);
              font-family: var(--mono);
              font-size: 0.75rem;
              margin-bottom: 10px;
            "
          >
            Click here, then press a key
          </div>
          <div id="key-display">—</div>
          <div id="key-meta"></div>
        </div>
        <div
          id="key-history"
          class="output"
          style="
            min-height: 44px;
            color: var(--text);
            line-height: 1.9;
            font-size: 0.75rem;
          "
        ></div>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
